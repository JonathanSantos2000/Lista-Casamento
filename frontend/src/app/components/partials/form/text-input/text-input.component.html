<app-input [label]="label">
  <input
    [type]="type"
    [placeholder]="label"
    [formControl]="formControl"
    [style.text-transform]="type === 'text' ? 'uppercase' : 'none'"
  />
  <app-input-validation [control]="control" [showErrorWhen]="showErrorWhen">
  </app-input-validation>
</app-input>
